# Enable mouse 
set -g mouse on

bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# keep numbering sequential
set -g renumber-windows on  

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

set -g history-limit 10000
# Options: start indexes from 1
set -g base-index 1
set -g pane-base-index 1

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resize panes with Prefix + Shift + Arrow
bind -r S-Left  resize-pane -L 10
bind -r S-Right resize-pane -R 10
bind -r S-Up    resize-pane -U 10
bind -r S-Down  resize-pane -D 10

setw -g mode-keys vi

# Bind to cwd when creating a new pane
bind c new-window -c "#{pane_current_path}"

# Split panes in same directory
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Run Claude Code in a separate session
bind -r y run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w80% -h80% -E "tmux attach-session -t $SESSION"'
